<p-card class="p-mt-6 p-p-4 p-text-center">
  <img ngSrc="assets/logo-rectangle-300x100.png"
       width="300"
       height="100"
       priority
       class="logo p-mb-3"
       alt="Lobica Logo" />
  <h2 class="p-mb-3">Admin Login</h2>

  <div class="login-container">
    <div class="form-container">
      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        pInputText
        [(ngModel)]="username"
        autocomplete="username"
      />

      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        pPassword
        [(ngModel)]="password"
        autocomplete="current-password"
      />
    </div>

    <p *ngIf="errorMessage()" class="p-error">{{ errorMessage() }}</p>

    <button
      pButton
      type="button"
      label="Login"
      [loading]="loading()"
      (click)="login()"
      class="p-mt-2"
    ></button>
  </div>
</p-card>
