<div class="p-mb-3">
  <button
    pButton
    icon="pi pi-arrow-left"
    label="Back"
    class="p-button-secondary"
    (click)="goBack()"
  ></button>
</div>

<p-card header="AI Agent Profiles">
  <p-table [value]="agents()" [paginator]="true" [rows]="5" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th>Name</th>
        <th>Role</th>
        <th>Personality</th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-agent>
      <tr>
        <td>{{ agent.name }}</td>
        <td>{{ agent.role }}</td>
        <td>{{ agent.personality }}</td>
        <td>
          <button
            pButton
            icon="pi pi-pencil"
            class="p-button-sm p-mr-2"
            (click)="editAgent(agent)"
          ></button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <div class="p-mt-3">
    <button pButton label="Create New Agent" icon="pi pi-plus" (click)="createAgent()"></button>
  </div>
</p-card>
